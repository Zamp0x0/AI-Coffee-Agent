version: '3.8'

services:
  mysql:
    # 使用官方MySQL镜像，这里指定8.0版本
    image: mysql:8.0
    # 容器名称
    container_name: mysql-db
    # 重启策略：总是重启，除非手动停止
    restart: always
    # 环境变量配置
    environment:
      # MySQL根用户密码
      MYSQL_ROOT_PASSWORD: 136314
      # 创建一个新数据库
      MYSQL_DATABASE: test
      # 创建一个新用户
      MYSQL_USER: test
      # 新用户的密码
      MYSQL_PASSWORD: 136314
      # 设置MySQL字符集为UTF-8
      MYSQL_INITDB_ARGS: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    # 端口映射：主机端口:容器端口（避免占用本机 3306）
    ports:
      - "13306:3306"
    # 数据卷配置，用于数据持久化
    volumes:
      # 挂载数据目录到主机，确保数据不会随容器删除而丢失
      - mysql_data:/var/lib/mysql
      # 挂载初始化脚本目录（首次启动会自动执行）
      - ./mysql-init:/docker-entrypoint-initdb.d
    # 健康检查：确保MySQL服务正常运行
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    # 资源限制（compose v3 的 deploy 在非 swarm 下通常不生效，但保留无妨）
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  redis:
    # 使用Redis Stack镜像，包含RediSearch等模块
    image: redis/redis-stack:latest
    # 容器名称
    container_name: redis-stack-sg
    # 重启策略：总是重启，除非手动停止
    restart: always
    # 端口映射：避免占用本机 6379 / 8001
    ports:
      - "6381:6379"      # Redis服务端口
      - "8002:8001"      # RedisInsight管理界面端口
    # 环境变量配置
    environment:
      # Redis密码
      REDIS_ARGS: "--requirepass 136314"
    # 数据卷配置，用于数据持久化
    volumes:
      # 挂载数据目录到主机
      - ./redis-data:/data
      # 挂载配置文件（可选）
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    # 健康检查：确保Redis服务正常运行
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "136314", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # 资源限制（同上）
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

# 定义数据卷，用于持久化数据
volumes:
  mysql_data:
    driver: local
