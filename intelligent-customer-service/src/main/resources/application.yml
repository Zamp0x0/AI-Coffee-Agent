server:
  port: 8085
  servlet:
    context-path: /api

spring:
  application:
    name: "intelligent customer service"

  # 数据库配置（连本机 Docker MySQL：13306）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:13306/test?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: test
    password: 136314

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # Redis配置（连本机 Docker Redis Stack：6381）
  data:
    redis:
      host: localhost
      port: 6381
      password: 136314
      database: 0
      timeout: 5000ms

  # DashScope / Spring AI 配置（保持你原来的）
  ai:
    memory:
      jdbc:
        table-name: ai_chat_memory
        create-table: true  # 自动创建表结构（在 MySQL 里建表）
    # Redis 向量存储（RAG）
    vectorstore:
      redis:
        initialize-schema: true
        index-name: knowledge_vector_index
        prefix: "rag:"
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: ${MODEL_NAME}

feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 10000

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread]  %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    cn.sg.intelligentcustomerservice: DEBUG
    org.springframework.ai: DEBUG
    io.modelcontextprotocol.client: DEBUG
    io.modelcontextprotocol.spec: DEBUG

management:
  tracing:
    sampling:
      probability: 1.0

app:
  knowledge:
    csv-path: F:/JavaSGCT/intelligent-customer-service/intelligent-customer-service/qa/QA.csv
  rag:
    top-k: 3
    similarity-threshold: 0.7
